services:
  # Backend: FastAPI
  - type: web
    name: caternow-backend-prod
    env: python
    region: frankfurt # Empfohlen für EU, Render unterstützt 'frankfurt'
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install --prefer-binary -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false # Wird via Env Group gesetzt
      - key: DATABASE_URL
        sync: false # Wird via Env Group gesetzt
      - key: ADMIN_SECRET
        sync: false # Wird via Env Group gesetzt

  # Frontend: React / Vite
  - type: web
    name: caternow-frontend-prod
    env: static
    region: frankfurt
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: NODE_VERSION
        value: 20.x
      # Firebase Config Keys - werden in der Render-UI / Env Group gesetzt
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_API_URL
        sync: false # e.g. https://caternow-backend-prod.onrender.com
