services:
  # Backend: FastAPI
  - type: web
    name: caternow-backend
    env: python
    region: frankfurt # Empfohlen für EU, Render unterstützt 'frankfurt'
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false # Wird in der Render-UI gesetzt
      - key: DATABASE_URL
        sync: false # Neon DB URL, wird in UI gesetzt

  # Frontend: React / Vite
  - type: web
    name: caternow-frontend
    env: static
    region: frankfurt
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: 20.x
      # Firebase Config Keys - werden in der Render-UI gesetzt
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
